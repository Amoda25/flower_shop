<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Bloomi Flowers</title>
  <meta name="description" content="Sign in or create your Bloomi Flowers account." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Lato', sans-serif; background: #fff9fb; }

    /* ===== SPLIT LAYOUT ===== */
    .auth-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* ---- Left: Form Panel ---- */
    .auth-form-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 64px;
      background: #ffffff;
      position: relative;
      overflow: hidden;
    }

    .auth-form-panel::before {
      content: '';
      position: absolute;
      top: -120px; left: -120px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(255,166,190,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .auth-form-panel::after {
      content: '';
      position: absolute;
      bottom: -100px; right: -100px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(250,78,121,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Brand mark */
    .auth-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 44px;
      text-decoration: none;
    }
    .auth-brand-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FA4E79, #FF648B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    .auth-brand-icon {
      font-size: 1.3rem;
    }
    .auth-brand-tagline {
      font-size: 0.72rem;
      color: #b08090;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: -4px;
      display: block;
    }

    /* Greeting */
    .auth-greeting h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.1rem;
      color: #1a0a10;
      font-weight: 700;
      line-height: 1.2;
    }
    .auth-greeting h1 span { color: #FA4E79; }
    .auth-greeting p {
      color: #b08090;
      font-size: 0.95rem;
      margin-top: 8px;
      font-style: italic;
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      gap: 0;
      margin: 32px 0 28px;
      border-bottom: 2px solid #fce4ec;
    }
    .auth-tab {
      background: none;
      border: none;
      padding: 10px 0;
      margin-right: 28px;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #c4a0ae;
      cursor: pointer;
      letter-spacing: 0.5px;
      position: relative;
      transition: color 0.2s;
    }
    .auth-tab::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 2px;
      background: #FA4E79;
      border-radius: 2px;
      transform: scaleX(0);
      transition: transform 0.2s;
    }
    .auth-tab.active { color: #FA4E79; }
    .auth-tab.active::after { transform: scaleX(1); }

    /* Forms */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-group-auth {
      margin-bottom: 20px;
    }
    .form-group-auth label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: #5a2e40;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .form-group-auth input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #fce4ec;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'Lato', sans-serif;
      color: #1a0a10;
      background: #fff9fb;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group-auth input:focus {
      border-color: #FA4E79;
      box-shadow: 0 0 0 3px rgba(250,78,121,0.12);
    }
    .form-group-auth input::placeholder { color: #c4a0ae; }

    .form-row-auth {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 0.83rem;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #7a4a58;
      cursor: pointer;
    }
    .remember-me input[type="checkbox"] {
      accent-color: #FA4E79;
      width: 15px; height: 15px;
    }
    .forgot-link {
      color: #FA4E79;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.83rem;
      transition: opacity 0.2s;
    }
    .forgot-link:hover { opacity: 0.75; }

    .btn-auth {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #FA4E79, #FF648B);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Lato', sans-serif;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.25s;
      box-shadow: 0 6px 20px rgba(250,78,121,0.35);
    }
    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(250,78,121,0.45);
    }
    .btn-auth:active { transform: translateY(0); }

    /* Divider */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      color: #c4a0ae;
      font-size: 0.8rem;
      margin: 20px 0;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #fce4ec;
    }

    /* Social Login */
    .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px;
      border: 1.5px solid #fce4ec;
      border-radius: 10px;
      background: #fff;
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: #5a2e40;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-social:hover {
      border-color: #FA4E79;
      background: #fff9fb;
    }

    /* Success message */
    .auth-success {
      display: none;
      background: linear-gradient(135deg, #fff0f3, #fce4ec);
      border: 1.5px solid rgba(250,78,121,0.25);
      border-radius: 12px;
      padding: 20px 24px;
      text-align: center;
      margin-top: 8px;
    }
    .auth-success .success-icon { font-size: 2.5rem; }
    .auth-success h3 {
      font-family: 'Playfair Display', serif;
      color: #FA4E79;
      margin: 10px 0 6px;
    }
    .auth-success p { color: #7a4a58; font-size: 0.9rem; }

    /* Back link */
    .auth-back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 28px;
      color: #b08090;
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .auth-back-link:hover { color: #FA4E79; }

    /* ---- Right: Image Panel ---- */
    .auth-image-panel {
      position: relative;
      overflow: hidden;
    }
    .auth-image-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .auth-image-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(250,78,121,0.30) 0%,
        rgba(30,8,14,0.50) 100%
      );
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 52px 48px;
    }
    .auth-image-quote {
      color: rgba(255,255,255,0.95);
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      line-height: 1.4;
      font-style: italic;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .auth-image-quote span {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      font-style: normal;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.7;
      margin-top: 12px;
    }

    /* Decorative border frame on image */
    .auth-image-frame {
      position: absolute;
      top: 24px; right: 24px; bottom: 24px; left: 24px;
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      pointer-events: none;
    }

    /* Responsive */
    @media (max-width: 860px) {
      .auth-page { grid-template-columns: 1fr; }
      .auth-image-panel { display: none; }
      .auth-form-panel { padding: 48px 32px; }
    }
    @media (max-width: 420px) {
      .auth-form-panel { padding: 40px 20px; }
      .auth-greeting h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

<div class="auth-page">

  <!-- ========== LEFT: FORM PANEL ========== -->
  <div class="auth-form-panel">

    <!-- Brand -->
    <a href="index.html" class="auth-brand">
      <div>
        <span class="auth-brand-logo">Bloomi ✿</span>
        <span class="auth-brand-tagline">Sri Lanka's Flower Shop</span>
      </div>
    </a>

    <!-- Greeting (dynamic) -->
    <div class="auth-greeting" id="authGreeting">
      <h1>Hello, <span>Welcome Back!</span></h1>
      <p>Say it with flowers 🌸</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
      <button class="auth-tab" id="tabSignUp" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- ===== SIGN IN FORM ===== -->
    <form class="auth-form active" id="formSignIn" onsubmit="handleSignIn(event)">
      <div class="form-group-auth">
        <label for="si-email">Email</label>
        <input type="email" id="si-email" placeholder="your@email.com" required />
      </div>
      <div class="form-group-auth">
        <label for="si-password">Password</label>
        <input type="password" id="si-password" placeholder="Enter your password" required />
      </div>

      <div class="form-row-auth">
        <label class="remember-me">
          <input type="checkbox" /> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-auth">Sign In →</button>

      <div class="auth-divider">or continue with</div>

      <div class="social-btns">
        <button type="button" class="btn-social">🌐 Google</button>
        <button type="button" class="btn-social">📘 Facebook</button>
      </div>
    </form>

    <!-- ===== SIGN UP FORM ===== -->
    <form class="auth-form" id="formSignUp" onsubmit="handleSignUp(event)">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group-auth">
          <label for="su-first">First Name</label>
          <input type="text" id="su-first" placeholder="Amara" required />
        </div>
        <div class="form-group-auth">
          <label for="su-last">Last Name</label>
          <input type="text" id="su-last" placeholder="Perera" required />
        </div>
      </div>
      <div class="form-group-auth">
        <label for="su-email">Email</label>
        <input type="email" id="su-email" placeholder="your@email.com" required />
      </div>
      <div class="form-group-auth">
        <label for="su-phone">Phone (optional)</label>
        <input type="tel" id="su-phone" placeholder="+94 70 000 0000" />
      </div>
      <div class="form-group-auth">
        <label for="su-password">Password</label>
        <input type="password" id="su-password" placeholder="Create a password" required />
      </div>

      <button type="submit" class="btn-auth" style="margin-top:4px;">Create Account 🌸</button>
    </form>

    <!-- Success Message -->
    <div class="auth-success" id="authSuccess">
      <div class="success-icon">🌹</div>
      <h3 id="successTitle">Welcome to Bloomi!</h3>
      <p id="successMsg">You're signed in. Redirecting to the shop...</p>
    </div>

    <a href="index.html" class="auth-back-link">← Back to Homepage</a>
  </div>

  <!-- ========== RIGHT: IMAGE PANEL ========== -->
  <div class="auth-image-panel">
    <img src="images/login_flower_bg.png" alt="Beautiful pink roses" />
    <div class="auth-image-overlay">
      <p class="auth-image-quote">
        "Flowers are the music of the ground — from earth's lips spoken without sound."
        <span>— Edwin Curran</span>
      </p>
    </div>
    <div class="auth-image-frame"></div>
  </div>

</div>

<script>
  function switchTab(tab) {
    const isSignIn = tab === 'signin';

    document.getElementById('tabSignIn').classList.toggle('active', isSignIn);
    document.getElementById('tabSignUp').classList.toggle('active', !isSignIn);
    document.getElementById('formSignIn').classList.toggle('active', isSignIn);
    document.getElementById('formSignUp').classList.toggle('active', !isSignIn);
    document.getElementById('authSuccess').style.display = 'none';

    const greeting = document.getElementById('authGreeting');
    if (isSignIn) {
      greeting.innerHTML = '<h1>Hello, <span>Welcome Back!</span></h1><p>Say it with flowers 🌸</p>';
    } else {
      greeting.innerHTML = '<h1>Join <span>Bloomi</span> Today!</h1><p>Create your account and start blooming 🌹</p>';
    }
  }

  function getRedirectTarget() {
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect');
    if (redirect === 'profile') return 'profile.html';
    return 'index.html';
  }


  function handleSignIn(e) {
    e.preventDefault();
    const email = document.getElementById('si-email').value;
    const name = email.split('@')[0];
    localStorage.setItem('bloomiUser', JSON.stringify({
      name: name.charAt(0).toUpperCase() + name.slice(1),
      email: email
    }));
    document.getElementById('formSignIn').style.display = 'none';
    const s = document.getElementById('authSuccess');
    document.getElementById('successTitle').textContent = 'Welcome back! 🌸';
    document.getElementById('successMsg').textContent = 'You are signed in. Redirecting...';
    s.style.display = 'block';
    setTimeout(() => { window.location.replace(getRedirectTarget()); }, 1800);
  }

  function handleSignUp(e) {
    e.preventDefault();
    const first = document.getElementById('su-first').value;
    const last = document.getElementById('su-last').value;
    const email = document.getElementById('su-email').value;
    const phone = document.getElementById('su-phone').value;
    localStorage.setItem('bloomiUser', JSON.stringify({
      name: first + ' ' + last,
      email: email,
      phone: phone
    }));
    document.getElementById('formSignUp').style.display = 'none';
    const s = document.getElementById('authSuccess');
    document.getElementById('successTitle').textContent = `Welcome, ${first}! 🌹`;
    document.getElementById('successMsg').textContent = 'Your account has been created! Redirecting...';
    s.style.display = 'block';
    setTimeout(() => { window.location.replace(getRedirectTarget()); }, 1800);
  }
</script>

</body>
</html>
